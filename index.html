<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Эмани - Кондитерская & Кулинария</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #fcfaf7;
        color: #201f16;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #8b784e;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #5a4b26;
      }
      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(18px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes softFloat {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }
        50% {
          transform: translate3d(0, -8px, 0);
        }
      }
      @keyframes gentleGlow {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.55;
        }
      }
      .reveal-up {
        animation: fadeUp 0.8s ease-out both;
      }
      .reveal-delay-1 {
        animation-delay: 0.1s;
      }
      .reveal-delay-2 {
        animation-delay: 0.2s;
      }
      .soft-float {
        animation: softFloat 10s ease-in-out infinite;
      }
      .gentle-glow {
        animation: gentleGlow 8s ease-in-out infinite;
      }
      .hover-lift {
        transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease;
      }
      .hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 48px rgba(32, 31, 22, 0.08);
      }
      .ambient-orb {
        pointer-events: none;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emani: {
                dark: '#201f16',
                brown: '#5a4b26',
                gold: '#8b784e',
                lightGold: '#c0ae84',
                cream: '#d9d3c9',
                blue: '#007cfe',
                silver: '#bac0cb',
                rose: '#9b6767'
              }
            }
          }
        }
      }
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
