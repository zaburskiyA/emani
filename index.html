<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Эмани - Кондитерская & Кулинария</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFiD-vYSZviVYUb_rj3ij__anPXDTjYgFE_.woff2" as="font" type="font/woff2" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-display: 'Playfair Display', serif;
        --font-body: 'Lora', serif;
        --text-xs: 12px;
        --text-sm: 14px;
        --text-base: 17px;
        --text-md: 22px;
        --text-lg: 30px;
        --text-xl: 40px;
        --text-2xl: 53px;
        --text-3xl: 71px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 32px;
        --space-5: 40px;
        --space-6: 48px;
        --space-8: 80px;
        --space-10: 80px;
        --space-12: 96px;
        --space-16: 128px;
        --space-20: 160px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        font-size: clamp(16px, 1.15vw, 18px);
        line-height: 1.6;
        background-color: #fcfaf7;
        color: #201f16;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--font-display);
      }

      .app-shell.mobile-drawer-open {
        height: 100dvh;
        overflow: hidden;
      }

      .mobile-drawer-panel {
        box-sizing: border-box;
        padding: calc(var(--space-6) + env(safe-area-inset-top)) var(--space-6)
          calc(var(--space-6) + env(safe-area-inset-bottom));
        -webkit-overflow-scrolling: touch;
      }

      .about-editorial-page {
        --about-splitter-top: #f8f3ea;
        --about-splitter-mid: #faf6ef;
        --about-splitter-bottom: #fcfaf7;
        background: radial-gradient(circle at 12% 12%, #f8f0e4 0%, #fcfaf7 46%, #f6f0e6 100%);
        overflow-x: hidden;
      }

      .about-shell {
        max-width: 1200px;
        margin-inline: auto;
        padding-inline: var(--space-3);
      }

      .about-hero .about-shell {
        max-width: 1420px;
        padding-inline: clamp(16px, 2vw, 32px);
      }

      .about-section {
        padding-block: var(--space-10);
      }

      .about-section-warm {
        background: linear-gradient(165deg, #fbf7f1 0%, #f7efe1 100%);
      }

      .about-section-cream {
        background: linear-gradient(180deg, #f6efe2 0%, #fcfaf7 100%);
      }

      .about-section-partners {
        background: #f8f3ea;
        padding-bottom: var(--space-4);
      }

      .about-label {
        margin: 0;
        font-family: var(--font-body);
        font-size: 16px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #8b784e;
      }

      .about-label-offset {
        margin-top: var(--space-4);
      }

      .about-hero {
        position: relative;
        padding-block: clamp(40px, 7vw, 88px);
        overflow: visible;
      }

      .about-hero-grid {
        display: grid;
        gap: clamp(24px, 4vw, 56px);
        align-items: center;
      }

      .about-hero-media {
        --hero-media-shift: 16px;
        --hero-media-overhang: 0px;
        position: relative;
        width: 100%;
        aspect-ratio: 1396 / 1110;
        border-radius: 28px;
        border: 1px solid rgba(139, 120, 78, 0.32);
        border-right: 0;
        justify-self: end;
        background-position: calc(0% - var(--hero-media-shift)) center;
        background-repeat: no-repeat;
        background-size: calc(100% + var(--hero-media-shift)) auto;
        box-shadow: 0 30px 72px rgba(39, 33, 22, 0.17);
        overflow: hidden;
        justify-self: end;
      }

      .about-hero-media::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(25, 21, 15, 0.06) 0%, rgba(25, 21, 15, 0.26) 100%);
        z-index: 1;
      }

      .about-hero picture,
      .about-hero img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .about-hero-content {
        position: relative;
        z-index: 1;
        padding-block: var(--space-2);
        width: calc(100% + clamp(16px, 2vw, 32px));
        max-width: none;
        color: #201f16;
      }

      .about-hero-content .about-label {
        color: #8b784e;
      }

      .about-hero-content .about-body {
        color: #3a352c;
      }

      .about-hero-title {
        margin: 0;
        max-width: 19ch;
        font-family: var(--font-display);
        font-size: clamp(2rem, 4.05vw, 2.925rem);
        line-height: 1.05;
        letter-spacing: -0.025em;
        text-wrap: balance;
      }

      .about-hero-facts {
        margin-top: var(--space-2);
        display: grid;
        gap: var(--space-1);
        max-width: 56ch;
      }

      .about-hero-facts .about-body {
        font-size: var(--text-base);
        line-height: 1.5;
      }

      .about-location-card .about-label {
        font-size: 19.2px;
      }

      .about-location-card .about-hero-facts .about-body {
        font-size: calc(var(--text-base) * 1.2);
        line-height: 1.55;
      }

      .about-intro {
        margin: var(--space-3) 0 0;
        max-width: 48ch;
        font-size: var(--text-md);
        line-height: 1.5;
        font-weight: 400;
      }

      .about-button {
        margin-top: var(--space-4);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        min-height: 48px;
        padding: var(--space-3) var(--space-5);
        border: 1px solid #dbc89f;
        background: #8b784e;
        color: #fff;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 16px;
        font-weight: 500;
        transition: background-color 0.22s ease, border-color 0.22s ease, transform 0.22s ease;
      }

      .about-button:hover,
      .about-button:focus-visible,
      .about-button:active {
        background: #5a4b26;
        border-color: #5a4b26;
      }

      .about-button:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }

      .about-button-secondary {
        background: #201f16;
        border-color: #201f16;
      }

      .about-diagonal-divider {
        position: relative;
        height: clamp(48px, 4vw, 64px);
        margin-block: -6px;
        background: linear-gradient(180deg, var(--about-splitter-top) 0%, var(--about-splitter-mid) 50%, var(--about-splitter-bottom) 100%);
        clip-path: polygon(0 12%, 100% 0, 100% 88%, 0 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          inset 0 -1px 0 rgba(74, 59, 31, 0.05),
          0 10px 24px rgba(39, 33, 22, 0.03);
        overflow: hidden;
      }

      .about-diagonal-divider-reverse {
        clip-path: polygon(0 0, 100% 12%, 100% 100%, 0 88%);
      }

      .about-diagonal-divider::before,
      .about-diagonal-divider::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .about-diagonal-divider::before {
        background:
          linear-gradient(118deg, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0) 42%),
          linear-gradient(292deg, rgba(139, 120, 78, 0.06) 0%, rgba(139, 120, 78, 0) 58%);
        opacity: 0.75;
      }

      .about-diagonal-divider::after {
        background: linear-gradient(180deg, rgba(32, 31, 22, 0.045) 0%, rgba(32, 31, 22, 0) 30%, rgba(32, 31, 22, 0) 70%, rgba(32, 31, 22, 0.04) 100%);
        opacity: 0.65;
      }

      .about-feature-layout {
        display: grid;
        gap: var(--space-6);
      }

      .about-feature-media-wrap {
        position: relative;
        width: 100%;
        overflow: visible;
      }

      .about-feature-copy {
        position: relative;
        z-index: 2;
      }

      .about-partner-lines {
        display: grid;
        gap: var(--space-2);
      }

      .about-partner-lines .about-body + .about-body,
      .about-stm-intro .about-body + .about-body {
        margin-top: 0;
      }

      .about-stm-intro {
        margin: 0;
        width: 100%;
        max-width: 72ch;
        padding: clamp(16px, 2vw, 28px) clamp(18px, 2.6vw, 34px);
        border-left: 4px solid #8b784e;
        border-radius: 0 22px 22px 0;
        background: linear-gradient(95deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.56) 100%);
        box-shadow: 0 16px 36px rgba(39, 33, 22, 0.08);
        font-family: var(--font-body);
        font-size: clamp(1.32rem, 2.15vw, 1.72rem);
        line-height: 1.52;
        color: #2f2a22;
        text-wrap: pretty;
        animation: introSettle 0.95s cubic-bezier(0.2, 0.7, 0.2, 1) 0.08s both;
      }

      .about-section-first {
        padding-top: 0;
      }

      .about-section-directions {
        padding-top: calc(var(--space-10) - 40px);
        margin-top: -20px;
        transform: translateY(-20px);
        margin-bottom: -20px;
      }

      .about-section-title {
        margin: var(--space-3) 0;
        max-width: 18ch;
        font-size: clamp(var(--text-lg), 3.5vw, var(--text-2xl));
        line-height: 1.14;
      }

      .about-body {
        margin: 0;
        max-width: 65ch;
        font-size: clamp(16px, 1.1vw, 18px);
        line-height: 1.7;
        color: #3a352c;
      }

      .about-body + .about-body {
        margin-top: var(--space-4);
      }

      .about-media-frame {
        border: 1px solid rgba(139, 120, 78, 0.24);
        border-radius: 30px;
        overflow: hidden;
        aspect-ratio: 4 / 5;
        box-shadow: 0 32px 80px rgba(39, 33, 22, 0.16);
      }

      .about-media-frame picture,
      .about-media-frame img,
      .about-direction-media picture,
      .about-direction-media img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .about-retail-collage {
        position: relative;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: clamp(12px, 2.8vw, 20px);
        align-items: start;
        padding: clamp(18px, 3vw, 28px) 0 clamp(54px, 9vw, 108px);
        width: 112%;
        margin-left: -6%;
        isolation: isolate;
      }

      .about-retail-collage::before {
        content: '';
        position: absolute;
        inset: clamp(18px, 5vw, 42px) clamp(10px, 3vw, 18px) 0;
        border-radius: clamp(26px, 5vw, 40px);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.4) 0%, rgba(248, 239, 225, 0.92) 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.64);
        z-index: 0;
      }

      .about-retail-collage::after {
        content: '';
        position: absolute;
        right: 6%;
        bottom: 10%;
        width: clamp(96px, 24vw, 184px);
        aspect-ratio: 1;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(139, 120, 78, 0.18) 0%, rgba(139, 120, 78, 0.06) 38%, rgba(139, 120, 78, 0) 70%);
        filter: blur(6px);
        z-index: 0;
      }

      .about-retail-card {
        position: relative;
        margin: 0;
        overflow: hidden;
        border-radius: clamp(18px, 3.6vw, 30px);
        border: 1px solid rgba(139, 120, 78, 0.22);
        background: #fff;
        box-shadow: 0 22px 55px rgba(39, 33, 22, 0.16);
        z-index: 1;
      }

      .about-retail-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(32, 31, 22, 0.08) 100%);
        opacity: 0.45;
        pointer-events: none;
      }

      .about-retail-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .about-retail-card-main {
        grid-column: 1 / span 5;
        grid-row: 1 / span 2;
        aspect-ratio: 5 / 6;
      }

      .about-retail-card-tall {
        grid-column: 4 / -1;
        grid-row: 1;
        aspect-ratio: 4 / 5;
        transform: translate(-6%, 14%) rotate(4deg);
        z-index: 3;
      }

      .about-retail-card-square {
        grid-column: 1 / span 3;
        grid-row: 2;
        aspect-ratio: 1 / 1;
        align-self: end;
        transform: translateY(18%) rotate(-5deg);
        z-index: 4;
      }

      .about-retail-card-detail {
        grid-column: 3 / -1;
        grid-row: 2;
        width: min(100%, clamp(190px, 58vw, 330px));
        aspect-ratio: 1 / 1;
        justify-self: end;
        transform: translate(-2%, 30%) rotate(2.5deg);
        z-index: 5;
      }

      .about-pull-quote {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(var(--text-lg), 3.2vw, var(--text-xl));
        line-height: 1.18;
        font-style: italic;
        text-align: left;
        background: #fcf6ea;
        border-left: 5px solid #8b784e;
        color: #2d261c;
        padding: var(--space-5);
        max-width: 24ch;
      }

      .about-section-head {
        margin-bottom: var(--space-5);
      }

      .about-directions-grid {
        display: grid;
        grid-template-columns: 1fr;
        column-gap: var(--space-3);
        row-gap: var(--space-4);
      }

      .about-direction-card {
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(139, 120, 78, 0.26);
        background: rgba(255, 255, 255, 0.82);
        border-radius: 24px;
        overflow: hidden;
        padding: 0;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }

      .about-direction-card:hover,
      .about-direction-card:focus-within {
        transform: translateY(-4px);
        border-color: rgba(139, 120, 78, 0.4);
        box-shadow: 0 16px 40px rgba(32, 31, 22, 0.09);
      }

      .about-direction-media {
        overflow: hidden;
        aspect-ratio: 4 / 3;
        margin-bottom: 0;
      }

      .about-direction-card .about-body {
        margin: 0;
        padding: 10px 14px 14px;
        font-size: clamp(0.86rem, 1.28vw, 1.09rem);
        line-height: 1.5;
      }

      .about-card-title {
        margin: var(--space-1) 0 var(--space-2);
        font-size: clamp(var(--text-md), 2.5vw, var(--text-xl));
        line-height: 1.14;
      }

      .about-partners-layout {
        display: grid;
        gap: clamp(22px, 3vw, 42px);
        align-items: start;
      }

      .about-partners-showcase {
        display: grid;
        gap: clamp(18px, 2.8vw, 34px);
        width: 100%;
        padding-inline: clamp(16px, 4vw, 56px);
      }

      .about-partners-showcase-head {
        margin-bottom: 0;
      }

      .about-partners-showcase-head .about-section-title {
        max-width: none;
      }

      .about-partners-logo-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--space-3);
      }

      .about-partner-card {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        padding: clamp(16px, 2.1vw, 26px);
        border-radius: 16px;
        border: 1px solid rgba(139, 120, 78, 0.22);
        background: #fff;
      }

      .about-partner-logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: clamp(98px, 12vw, 132px);
        border-radius: 12px;
        background: #fff;
        padding: clamp(12px, 1.7vw, 20px);
      }

      .about-partner-logo {
        display: block;
        width: auto;
        max-width: min(100%, 230px);
        height: auto;
        max-height: 72px;
        object-fit: contain;
      }

      .about-partner-logo-vkusvill {
        max-width: min(100%, 260px);
      }

      .about-partner-logo-dobrinynsky {
        max-height: 90px;
        border-radius: 10px;
      }

      .about-partner-card-title {
        margin: 0;
        font-size: clamp(1.38rem, 2vw, 1.75rem);
      }

      .about-partners-content {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--space-6);
      }

      .about-partners-content > .about-stm-card {
        display: flex;
        flex-direction: column;
      }

      .about-partners-content .about-label {
        font-size: clamp(1.15rem, 1.85vw, 1.53rem);
        line-height: 1.24;
        letter-spacing: 0.08em;
      }

      .about-checklist {
        list-style: none;
        margin: var(--space-4) 0 0;
        padding: 0;
        display: grid;
        gap: var(--space-3);
        max-width: 65ch;
      }

      .about-checklist-compact {
        margin-top: var(--space-3);
        gap: var(--space-2);
      }

      .about-checklist-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-2);
        font-size: clamp(1.01rem, 1.65vw, 1.31rem);
        line-height: 1.58;
        color: #3a352c;
      }

      .about-inline-emphasis {
        color: #5a4b26;
        font-weight: 700;
      }

      .about-checklist-item svg {
        margin-top: 5px;
        color: #8b784e;
        flex-shrink: 0;
      }

      .about-stm-card {
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(139, 120, 78, 0.24);
        padding: var(--space-3);
        box-shadow: 0 18px 38px rgba(39, 33, 22, 0.08);
      }

      .about-stm-card-offer .about-checklist-compact {
        margin-top: var(--space-4);
        gap: clamp(14px, 1.35vw, 20px);
      }

      .about-stm-second-block {
        margin-top: var(--space-3);
        padding-top: var(--space-3);
        border-top: 1px solid rgba(139, 120, 78, 0.24);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      ::-webkit-scrollbar-thumb {
        background: #8b784e;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #5a4b26;
      }

      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(18px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes softFloat {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }

        50% {
          transform: translate3d(0, -8px, 0);
        }
      }

      @keyframes gentleGlow {
        0%,
        100% {
          opacity: 0.3;
        }

        50% {
          opacity: 0.55;
        }
      }

      @keyframes introSettle {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideIn {
        0% {
          transform: translateX(100%);
        }

        100% {
          transform: translateX(0);
        }
      }

      @keyframes drawerIn {
        0% {
          transform: translateX(105%);
        }

        100% {
          transform: translateX(0);
        }
      }

      .reveal-up {
        animation: fadeUp 0.8s ease-out both;
      }

      .reveal-delay-1 {
        animation-delay: 0.1s;
      }

      .reveal-delay-2 {
        animation-delay: 0.2s;
      }

      .soft-float {
        animation: softFloat 10s ease-in-out infinite;
      }

      .gentle-glow {
        animation: gentleGlow 8s ease-in-out infinite;
      }

      .hover-lift {
        transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease;
      }

      .hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 48px rgba(32, 31, 22, 0.08);
      }

      .ambient-orb {
        pointer-events: none;
      }

      @media (min-width: 390px) {
        .about-shell {
          padding-inline: var(--space-4);
        }
      }

      @media (max-width: 767px) {
        .about-stm-intro {
          padding: 16px 18px;
          border-radius: 0 18px 18px 0;
        }

        .about-partners-content {
          gap: clamp(18px, 5vw, 28px);
        }

        .about-stm-card {
          padding: clamp(16px, 4.2vw, 24px);
        }

        .about-checklist-item {
          font-size: clamp(1.01rem, 1.65vw, 1.31rem);
          line-height: 1.66;
        }

        .about-partner-card {
          border-radius: 14px;
        }
      }

      @media (min-width: 768px) {
        .about-section {
          padding-block: var(--space-12);
        }

        .about-section.about-section-directions {
          padding-top: calc(var(--space-12) - 20px);
          margin-top: -20px;
          transform: none;
        }

        .about-hero-grid {
          grid-template-columns: minmax(0, 0.78fr) minmax(0, 1.22fr);
          column-gap: clamp(28px, 4vw, 64px);
        }

        .about-hero-media {
          --hero-media-overhang: clamp(20px, 4vw, 48px);
          width: calc((100% + (var(--hero-media-overhang) * 0.85)) * 0.85);
          max-width: none;
          justify-self: end;
          border-radius: 34px;
        }

        .about-hero-title {
